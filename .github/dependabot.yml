version: 2
updates:
  # NPM dependencies
  - package-ecosystem: "npm"
    directory: "/"
    target-branch: "develop"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Europe/Paris"
    open-pull-requests-limit: 10
    commit-message:
      prefix: "chore(deps)"
    labels:
      - "dependencies"
      - "npm"
    groups:
      radix-ui:
        patterns:
          - "@radix-ui/*"
          - "radix-ui"
      drizzle:
        patterns:
          - "drizzle-*"
          - "@lucia-auth/adapter-drizzle"
      aws-sdk:
        patterns:
          - "@aws-sdk/*"
      dnd-kit:
        patterns:
          - "@dnd-kit/*"
      types:
        patterns:
          - "@types/*"
      eslint-next:
        patterns:
          - "eslint*"
          - "@next/eslint*"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    target-branch: "develop"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Europe/Paris"
    commit-message:
      prefix: "ci(deps)"
    labels:
      - "dependencies"
      - "github-actions"

  # Docker (Dockerfile base image)
  - package-ecosystem: "docker"
    directory: "/"
    target-branch: "develop"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Europe/Paris"
    commit-message:
      prefix: "chore(docker)"
    labels:
      - "dependencies"
      - "docker"
