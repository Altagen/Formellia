name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

permissions:
  contents: read
  security-events: write

jobs:
  # Validate commit messages against Conventional Commits (PRs only)
  commitlint:
    name: 📝 Commit Lint
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc

      - name: Install commitlint
        run: npm install -g @commitlint/cli @commitlint/config-conventional

      - name: Validate commits
        run: |
          npx commitlint \
            --from ${{ github.event.pull_request.base.sha }} \
            --to ${{ github.event.pull_request.head.sha }} \
            --verbose

  # Type-check + Next.js build
  build:
    name: 🎨 Typecheck & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npm run typecheck

      - name: Build
        run: npm run build
        env:
          # Placeholder required by Next at build time for SSR pages that
          # read env during collectPageData — not used at runtime in CI.
          DATABASE_URL: postgresql://user:pass@localhost:5432/build
          AUTH_SECRET: ci-build-placeholder-secret-min-32-chars

  # Vitest unit tests (no DB needed)
  test:
    name: ✅ Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

  # npm security audit — non-blocking, informational
  npm-audit:
    name: 🔒 npm Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Security audit
        run: npm audit --audit-level=high
        continue-on-error: true

  # CodeQL static analysis (TypeScript)
  codeql:
    name: 🛡️ CodeQL (TypeScript)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: javascript-typescript
          queries: security-and-quality

      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:javascript-typescript"

  # Secret leak detection
  gitleaks:
    name: 🕵️ Gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Dependency license + vulnerability review (PRs only)
  dependency-review:
    name: 🔍 Dependency Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v6

      - uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high

  # Smoke-build the Docker image (no push) — catches Dockerfile regressions
  docker-build:
    name: 🐳 Docker Build Smoke
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@v4

      - name: Build image (load locally so we can boot it)
        uses: docker/build-push-action@v7
        with:
          context: .
          push: false
          load: true
          tags: formellia:smoke
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Boot the image with throwaway env and verify Next listens on dual-stack.
      # Next binds the port BEFORE the instrumentation hook runs, so the LISTEN
      # appears within ~1s even though bootstrap retries the (absent) DB.
      # We only check IPv6: HOSTNAME="::" makes Node listen on [::]:3000 with
      # IPV6_V6ONLY=0 default, so v4 traffic comes in via v4-mapped-v6 on the
      # same socket — a single LISTEN is enough to prove dual-stack works.
      - name: Boot image and assert dual-stack listener
        run: |
          docker run -d --name smoke \
            -e ENCRYPTION_KEY=$(openssl rand -hex 32) \
            -e AUTH_SECRET=$(openssl rand -base64 32) \
            -e DATABASE_URL=postgres://x:x@nowhere:5432/x \
            formellia:smoke

          # Give Next a few seconds to print "Ready".
          for i in $(seq 1 20); do
            if docker logs smoke 2>&1 | grep -q "Ready in"; then break; fi
            sleep 1
          done

          # /proc/net/tcp6 column 4 == "0A" means LISTEN; column 2 == hex addr:port.
          # Port 3000 = 0x0BB8. We expect a row "0...0:0BB8".
          if ! docker exec smoke sh -c \
            "awk 'NR>1 && \$4==\"0A\" && \$2 ~ /:0BB8\$/' /proc/net/tcp6 | grep -q ."; then
            echo "::error::Image is not listening on [::]:3000 — Next is not bound dual-stack."
            echo "--- container logs ---"
            docker logs smoke
            echo "--- /proc/net/tcp6 ---"
            docker exec smoke cat /proc/net/tcp6 || true
            exit 1
          fi
          echo "✓ Image listens on [::]:3000 (dual-stack)"

      - name: Cleanup smoke container
        if: always()
        run: docker rm -f smoke || true
