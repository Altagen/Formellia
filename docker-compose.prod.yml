services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-formellia}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-formellia}
      AUTH_SECRET: ${AUTH_SECRET}
      NODE_ENV: production
    depends_on:
      db:
        condition: service_healthy

  caddy:
    image: caddy:2-alpine
    # Bind both IPv4 and IPv6 explicitly. Without the [::] entries, Podman
    # only forwards IPv4 even when the network has an IPv6 subnet, which
    # silently breaks 5G clients (Happy Eyeballs hangs on dead v6).
    ports:
      - "0.0.0.0:80:80"
      - "0.0.0.0:443:443"
      - "[::]:80:80"
      - "[::]:443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app

# Dual-stack network. Podman's auto-created network is IPv4-only by default,
# which means containers can't be reached on IPv6 even if the host has it.
# Required for any deployment that publishes AAAA DNS records.
networks:
  default:
    driver: bridge
    enable_ipv6: true
    ipam:
      config:
        - subnet: 10.89.0.0/24
        - subnet: fd00:dead:beef::/64

volumes:
  postgres_data:
  caddy_data:
  caddy_config:
